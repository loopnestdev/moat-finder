name: CI

on:
  # CI runs on every push to develop and main.
  # Railway's "Wait for CI" feature watches main: it auto-deploys only after
  # all checks here pass. No deploy hook or secret required.
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: typecheck + unit tests ─────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  # ── Frontend: typecheck + production build ───────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      # Build with placeholder env vars — real values injected by Cloudflare Pages.
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
          VITE_API_BASE_URL: https://placeholder.up.railway.app

